apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: flask-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/sandymaraf/flask-project-monorepo
    targetRevision: main
    path: helm/flask-chart
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: flask

  syncPolicy:
    automated:
      prune: true
      selfHeal: true